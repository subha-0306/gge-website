<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GGE Website - Premium Financial Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* Premium Preloader Styling */
      body.preloader-active {
        overflow: hidden !important;
        touch-action: none;
        -ms-touch-action: none;
      }

      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background-color: #080808;
        z-index: 99999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: opacity 500ms cubic-bezier(0.4, 0, 0.2, 1), visibility 500ms;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      #preloader.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .preloader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
        width: 100%;
        max-width: 600px;
      }

      .preloader-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        margin-bottom: 24px;
        opacity: 0;
        transform: scale(0.85);
        animation: logo-reveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        transition: transform 500ms cubic-bezier(0.25, 1, 0.3, 1), opacity 400ms ease;
      }

      .preloader-text-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 500ms cubic-bezier(0.25, 1, 0.3, 1), opacity 400ms ease;
      }

      .preloader-title {
        font-family: 'Outfit', 'Inter', sans-serif;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.05em;
        line-height: 1.2;
        margin: 0;
        background: linear-gradient(
          90deg,
          #cca740 0%,
          #e9d5a1 25%,
          #ffffff 50%,
          #e9d5a1 75%,
          #cca740 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        animation: 
          title-fade-in 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards,
          shimmer 3s linear infinite;
        animation-delay: 0.2s, 0.5s;
        opacity: 0;
        transform: translateY(10px);
      }

      .preloader-subtitle {
        font-family: 'Montserrat', 'Inter', sans-serif;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.32em;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        margin-top: 10px;
        opacity: 0;
        transform: translateY(8px);
        animation: subtitle-fade-in 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        animation-delay: 0.6s;
      }

      /* On preloader fade-out, fly contents towards navbar logo/title slots */
      #preloader.fade-out .preloader-logo {
        transform: translate(-25vw, -45vh) scale(0.65);
        opacity: 0;
      }

      #preloader.fade-out .preloader-text-container {
        transform: translate(-10vw, -45vh) scale(0.75);
        opacity: 0;
      }

      @media (min-width: 768px) {
        .preloader-title {
          font-size: 28px;
        }
        .preloader-subtitle {
          font-size: 10px;
        }
        #preloader.fade-out .preloader-logo {
          transform: translate(-40vw, -43vh) scale(0.55);
        }
        #preloader.fade-out .preloader-text-container {
          transform: translate(-30vw, -43vh) scale(0.65);
        }
      }

      @keyframes logo-reveal {
        0% {
          opacity: 0;
          transform: scale(0.85);
          filter: brightness(0.8) drop-shadow(0 0 0px rgba(204, 167, 64, 0));
        }
        100% {
          opacity: 1;
          transform: scale(1.05);
          filter: brightness(1.1) drop-shadow(0 4px 20px rgba(204, 167, 64, 0.25));
        }
      }

      @keyframes title-fade-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes subtitle-fade-in {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes shimmer {
        0% {
          background-position: 200% center;
        }
        100% {
          background-position: -200% center;
        }
      }
    </style>
  </head>
  <body class="preloader-active">
    <div id="preloader">
      <div class="preloader-content">
        <img src="/logo-icon.png" alt="Golden Globe Enterprises Logo" class="preloader-logo" />
        <div class="preloader-text-container">
          <h1 class="preloader-title">Golden Globe Enterprises</h1>
          <span class="preloader-subtitle">Finance That Fits Your Goal</span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
